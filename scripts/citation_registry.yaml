# Cascade Citation Registry
# ========================
# Hand-maintained mapping of citation strings to the equations actually
# implemented in the corresponding loss model or slip factor.
#
# Format:
#   citation_key: <exact string returned by .citation property>
#   equations_implemented:
#     - "Author YYYY eq. N.N"  (free text; human-readable summary)
#   notes: >
#     Optional explanatory notes.
#
# INVARIANT (CI-01): Every citation string found in the codebase by
# check_citations.py must have an entry here. Add new entries when adding
# new loss models or slip factors. Do not remove entries without removing
# the corresponding code.
#
# Bootstrapped 2026-05-26.

entries:
  - citation_key: >-
      Stanitz, J.D., 1952, 'Some Theoretical Aerodynamic Investigations
      of Impellers in Radial- and Mixed-Flow Centrifugal Compressors',
      Trans. ASME, 74, pp. 473–497.
    equations_implemented:
      - "Stanitz 1952 slip formula: sigma = 1 - 0.63*pi/Z"
    notes: >
      Used by StanitzSlip. Valid for radial-bladed (and near-radial) impellers.
      The 0.63 factor is the published Stanitz constant.

  - citation_key: >-
      Wiesner, F.J., 1967, 'A Review of Slip Factors for
      Centrifugal Impellers', Trans. ASME J. Eng. Power,
      89(4), pp. 558–566.
    equations_implemented:
      - "Wiesner 1967 eq. 1: sigma = 1 - sqrt(sin(beta2'))/Z^0.7"
      - "Wiesner 1967 geometric-limit correction for r1/r2 > epsilon_W"
    notes: >
      Used by WiesnerSlip (default). The geometric-limit correction prevents
      over-prediction of slip factor in low-radius-ratio machines.

  - citation_key: >-
      Stodola, A., 1924, *Dampf- und Gasturbinen*, Springer,
      Berlin. (English translation: Loewenstein, L.C., 1927,
      *Steam and Gas Turbines*, McGraw-Hill.)
    equations_implemented:
      - "Stodola 1924: sigma = 1 - pi*sin(beta2')/Z"
    notes: >
      Used by StodolaSlip. One of the earliest slip factor formulas;
      tends to under-predict sigma for strongly back-swept blades.

  - citation_key: >-
      Whitfield, A. & Baines, N.C., 1990, *Design of Radial
      Turbomachines*, Longman, Ch. 6 §6.1–§6.4.
      Tip clearance: Glassman 1976 NASA TN D-8164 eq. 11–13.
      Disc friction: Daily & Nece 1960 ASME J. Basic Eng. 82(1).
    equations_implemented:
      - "Whitfield-Baines (1990) Ch.6 §6.1: incidence loss formula"
      - "Whitfield-Baines (1990) Ch.6 §6.2: blade loading (passage) loss"
      - "Whitfield-Baines (1990) Ch.6 §6.3: skin friction / profile loss"
      - "Whitfield-Baines (1990) Ch.6 §6.4: secondary flow / tip clearance"
      - "Glassman 1976 NASA TN D-8164 eq. 11-13: tip clearance loss"
      - "Daily-Nece 1960 ASME J. Basic Eng. 82(1): disc friction (4-regime)"
      - "Whitfield-Baines trailing edge / scroll / exducer exit loss"
    notes: >
      Used by WhitfieldBainesRadial (the default radial turbine loss model).
      Daily-Nece 4-regime selector added per ADAPT-010.

  - citation_key: >-
      Aungier, R.H., 2000, *Centrifugal Compressors: A Strategy
      for Aerodynamic Design and Analysis*, ASME Press, Ch. 6
      (eq. 6.18 incidence, 6.34 blade loading, 6.41 skin friction,
      6.45 tip clearance, 6.51 mixing, 6.58 disc friction,
      6.61 recirculation [Oh-Yoon-Chung 1997], 6.66 leakage).
    equations_implemented:
      - "Aungier 2000 eq. 6.18: incidence loss (Conrad-Raghuram form)"
      - "Aungier 2000 eq. 6.34: blade loading (diffusion-factor based)"
      - "Aungier 2000 eq. 6.41: skin friction (passage profile loss)"
      - "Aungier 2000 eq. 6.45 / Jansen-Pampreen: tip clearance"
      - "Aungier 2000 eq. 6.51: jet-wake mixing (cos^2(beta2') form)"
      - "Aungier 2000 eq. 6.58 + Daily-Nece 1960: disc friction"
      - "Oh-Yoon-Chung 1997 (Aungier eq. 6.61): recirculation"
      - "Aungier 2000 eq. 6.66: leakage (orifice-flow, Cd=0.816)"
    notes: >
      Used by AungierCentrifugal. The mixing (eq. 6.51) and leakage
      (eq. 6.66) formulas were added in ADAPT-007. Daily-Nece 4-regime
      disc friction added in ADAPT-010.

  # W-32: Foil bearing K-C preset citations (W-32 AC4).
  - citation_key: >-
      Heshmat, H., Walowit, J.A., Pinkus, O., 1983,
      'Analysis of Gas Lubricated Foil Journal Bearings',
      J. Lubr. Technol. ASME 105(4), pp. 647-655.
    equations_implemented:
      - "Heshmat 1983 Fig. 5: direct stiffness K_yy vs. bearing number Lambda"
      - "Heshmat 1983 Fig. 8: direct damping C_yy vs. bearing number Lambda"
      - "Speed number Lambda = (6*mu*omega*L^2)/(pa*C^2) (Heshmat 1983 eq. 3)"
    notes: >
      Used by CAPSTONE_C30_FOIL_BEARING preset in
      src/cascade/rotor/bearing_presets/foil_bearings.py.
      K-C values derived from dimensional K-C charts at bearing number
      Lambda corresponding to a 30 mm foil bearing at 100 kPa, 300 K.
      Reference for v1 sparse 4-point table covering 10-80 kRPM.
      W-32 foil bearing preset (W-32 AC4).

  - citation_key: >-
      DellaCorte, C. and Valco, M.J., 2000,
      'Load Capacity Estimation of Foil Air Journal Bearings for
      Oil-Free Turbomachinery Applications',
      Tribol. Trans. 43(4), pp. 795-801. NASA TM-2000-209782.
    equations_implemented:
      - "DellaCorte-Valco 2000 Table 1: C1 load capacity coefficient for Gen I/II/III"
      - "Load capacity formula: W = C1 * (D * L) * N (DellaCorte-Valco 2000 eq. 1)"
      - "Gen III C1 = 1.8 N/mm2 (DellaCorte-Valco 2000, Table 1)"
    notes: >
      Used by DELLACORTE_NASA_FOIL_GEN_III preset in
      src/cascade/rotor/bearing_presets/foil_bearings.py.
      K-C table is derived by scaling Heshmat (1983) dimensionless charts to
      Gen III geometry (D=50 mm, L=50 mm). Load capacity formula provides
      the rated load at design speed for sizing checks.
      W-32 foil bearing preset (W-32 AC4).

